# PaperSpine lint configuration.
# Scripts are standard-library only and favor a wide line style.
line-length = 120
target-version = "py310"
extend-exclude = ["dist"]

[lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",   # line length is enforced softly; many tables/strings exceed it intentionally
    "E701",   # terse `if cond: x = y` mapping blocks are an intentional style
    "B008",   # default arg call (argparse/Path defaults are intentional)
    "UP022",  # tests pass stdout/stderr=PIPE explicitly for readability
]

[lint.per-file-ignores]
"tests/*" = ["E402"]  # tests insert sys.path before importing the script under test
